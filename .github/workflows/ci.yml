name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: shared 타입 체크
        run: npx tsc --noEmit --project shared/tsconfig.json

      - name: server 타입 체크
        run: npx tsc --noEmit --project server/tsconfig.json

      - name: shared 테스트
        run: npm test --workspace=shared

      - name: server 테스트
        run: npm test --workspace=server
        env:
          MONGODB_URI: mongodb://localhost:27017/beastleague-test
          JWT_SECRET: ci-test-secret
          INTERNAL_API_KEY: ci-test-key

      - name: client 빌드 체크
        run: npm run build --workspace=client
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000
