name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript 타입 체크 (shared)
        run: npx tsc --noEmit -p shared/tsconfig.json

      - name: TypeScript 타입 체크 (collector)
        run: npx tsc --noEmit -p collector/tsconfig.json

      - name: TypeScript 타입 체크 (server)
        run: npx tsc --noEmit -p server/tsconfig.json

      - name: shared 테스트
        run: npm test --workspace=shared

      - name: collector 테스트
        run: npm test --workspace=collector

      - name: server 테스트
        run: npm test --workspace=server
        env:
          MONGODB_URI: mongodb://localhost:27017/beastleague-test
          JWT_SECRET: ci-test-secret
          INTERNAL_API_KEY: ci-test-key
          NODE_ENV: test

      - name: client 빌드 체크
        run: npm run build --workspace=client
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
          NEXTAUTH_SECRET: ci-test-secret
          NEXTAUTH_URL: http://localhost:3000
