name: KBO 데이터 수집

on:
  workflow_dispatch:
    inputs:
      date:
        description: '수집 날짜 (YYYYMMDD, 비우면 오늘)'
        required: false
        default: ''
  schedule:
    - cron: '30 13 * * *'
    - cron: '30 14 * * *'
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Run KBO collector
        env:
          API_URL: ${{ secrets.API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          if [ -n "$DATE" ]; then
            python collector/kbo_collector.py "$DATE"
          else
            TODAY=$(TZ=Asia/Seoul date +%Y%m%d)
            python collector/kbo_collector.py "$TODAY"

            YESTERDAY=$(TZ=Asia/Seoul date -d '1 day ago' +%Y%m%d 2>/dev/null || TZ=Asia/Seoul date -v-1d +%Y%m%d)
            python collector/kbo_collector.py "$YESTERDAY"
          fi

      - name: Upload CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kbo-data-${{ github.run_id }}
          path: output/*.csv
          retention-days: 30
