name: KBO Data Collector

on:
  # 매일 자동 실행 (UTC 기준)
  schedule:
    # 경기 일정 수집: 한국시간 오전 10시 (UTC 01:00)
    - cron: '0 1 * * *'
    # 경기 결과 수집: 한국시간 밤 11시 (UTC 14:00)
    - cron: '0 14 * * *'

  # 수동 실행도 가능
  workflow_dispatch:
    inputs:
      command:
        description: 'Command: schedule, boxscore, daily'
        required: true
        default: 'daily'
      param:
        description: 'Parameter: date (YYYY-MM-DD) or gameId'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install collector dependencies
        working-directory: ./collector
        run: npm install

      - name: Determine command
        id: cmd
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "command=${{ github.event.inputs.command }}" >> $GITHUB_OUTPUT
            echo "param=${{ github.event.inputs.param }}" >> $GITHUB_OUTPUT
          else
            # cron 시간에 따라 자동 결정
            HOUR=$(TZ=Asia/Seoul date +%H)
            if [ "$HOUR" -lt "12" ]; then
              echo "command=schedule" >> $GITHUB_OUTPUT
            else
              echo "command=daily" >> $GITHUB_OUTPUT
            fi
            echo "param=" >> $GITHUB_OUTPUT
          fi

      - name: Run KBO scraper
        working-directory: ./collector
        env:
          API_URL: ${{ secrets.API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          echo "🏟️ Running: ${{ steps.cmd.outputs.command }} ${{ steps.cmd.outputs.param }}"
          npx ts-node src/kbo-scraper.ts ${{ steps.cmd.outputs.command }} ${{ steps.cmd.outputs.param }}
