name: KBO 데이터 수집

on:
  # 매일 밤 10시 30분(한국시간) = UTC 13:30 에 자동 실행
  schedule:
    - cron: '30 13 * * *'
  
  # 수동 실행 (GitHub에서 버튼 클릭)
  workflow_dispatch:
    inputs:
      date:
        description: '수집 날짜 (YYYY-MM-DD, 비우면 오늘)'
        required: false
        default: ''
      settle:
        description: '정산도 실행?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      # cheerio, axios 설치 (collector 워크스페이스에)
      - name: Install collector deps
        run: |
          cd collector
          npm install axios cheerio
          npm install -D @types/cheerio

      - name: Run auto collector
        env:
          API_URL: ${{ secrets.API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          SETTLE="${{ github.event.inputs.settle }}"
          
          # 날짜가 비었으면 오늘(KST)
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          fi
          
          # 정산 플래그
          SETTLE_FLAG=""
          if [ "$SETTLE" = "true" ]; then
            SETTLE_FLAG="--settle"
          fi
          
          echo "📅 수집 날짜: $DATE"
          echo "⚡ 정산: $SETTLE"
          
          npx ts-node collector/src/tools/autoCollect.ts --date "$DATE" $SETTLE_FLAG
